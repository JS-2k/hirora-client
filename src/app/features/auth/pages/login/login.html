<main class="auth-shell auth-login">
  <section class="auth-panel auth-panel-dark" aria-label="Hirora login message">
    <a class="auth-brand" href="/" aria-label="Hirora home">
      <span>HIRORA</span>
      <i aria-hidden="true"></i>
    </a>

    <div class="auth-story">
      <blockquote>
        "We replaced our 4-week screening loop with Hirora. Now it's 48 hours."
      </blockquote>
      <p>- Head of Talent, Series B startup</p>
    </div>

    <p class="auth-footnote">[ AI Recruitment OS ]</p>
  </section>

  <section class="auth-panel auth-form-panel" aria-labelledby="login-title">
    <div class="auth-form-wrap">
      <p class="auth-kicker">Login</p>
      <h1 id="login-title">Welcome back.</h1>

      <form class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" autocomplete="email" />
        </label>

        <label>
          <span>Password</span>
          <input type="password" autocomplete="current-password" />
        </label>

        <button type="submit" formaction="/company">Sign in</button>
      </form>

      <p class="auth-switch">No account? <a href="/signup">Sign up</a></p>
    </div>
  </section>
</main>
